apiVersion: v1
kind: Service
metadata:
  name: {{ include "nakama-runtime.fullname" . }}
  labels:
    {{- include "nakama-runtime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nakama-runtime.selectorLabels" . | nindent 4 }}
  ports:
  - name: grpc
    port: {{ .Values.service.grpcPort }}
    targetPort: grpc
    protocol: TCP
  - name: http
    port: {{ .Values.service.httpPort }}
    targetPort: http
    protocol: TCP
  - name: console
    port: {{ .Values.service.consolePort }}
    targetPort: console
    protocol: TCP
