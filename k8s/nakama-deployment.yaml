apiVersion: apps/v1
kind: Deployment
metadata:
  name: nakama
  namespace: default
  labels:
    app: nakama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nakama
  template:
    metadata:
      labels:
        app: nakama
    spec:
      containers:
      - name: nakama
        image: intelliverse-nakama:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 7349
          protocol: TCP
        - name: http
          containerPort: 7350
          protocol: TCP
        - name: console
          containerPort: 7351
          protocol: TCP
        env:
        - name: NAKAMA_NAME
          value: "nakama"
        volumeMounts:
        - name: nakama-config
          mountPath: /nakama/config.yml
          subPath: config.yml
          readOnly: true
        - name: nakama-data
          mountPath: /nakama/data
        - name: nakama-logs
          mountPath: /nakama/logs
        livenessProbe:
          httpGet:
            path: /
            port: 7350
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7350
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: nakama-config
        configMap:
          name: nakama-config
      - name: nakama-data
        persistentVolumeClaim:
          claimName: nakama-data-pvc
      - name: nakama-logs
        emptyDir: {}
