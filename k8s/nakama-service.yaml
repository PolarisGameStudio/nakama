apiVersion: v1
kind: Service
metadata:
  name: nakama-service
  namespace: default
  labels:
    app: nakama
spec:
  type: LoadBalancer
  selector:
    app: nakama
  ports:
  - name: grpc
    port: 7349
    targetPort: 7349
    protocol: TCP
  - name: http
    port: 7350
    targetPort: 7350
    protocol: TCP
  - name: console
    port: 7351
    targetPort: 7351
    protocol: TCP
